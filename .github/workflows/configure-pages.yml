name: Configure GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/configure-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Pages from docs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPO}/pages"
          body='{"source":{"branch":"main","path":"/docs"}}'
          status=$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api")

          if [ "$status" = "404" ]; then
            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" \
              -d "$body"
          else
            curl -sS -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" \
              -d "$body"
          fi

          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}/builds" || true
